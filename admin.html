<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Câu Hỏi | OceanGuard</title>
    <!-- Tailwind CSS 4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @theme {
            --color-primary-green: #22c55e;
            --color-primary-orange: #f97316;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Sticky Navbar -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-3xl">🌊</span>
                    <span class="text-2xl font-bold tracking-tight text-primary-green">OceanGuard</span>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="index.html#home" class="hover:text-primary-green transition-colors">Trang chủ</a>
                    <a href="quiz.html" class="hover:text-primary-green transition-colors">Trò chơi Quiz</a>
                    <a href="admin.html" class="text-primary-green font-bold transition-colors">Quản lý câu hỏi</a>
                    <a href="index.html#contact" class="hover:text-primary-green transition-colors">Liên hệ</a>
                </div>
                <div class="md:hidden text-2xl cursor-pointer">🍔</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900">Quản Lý Câu Hỏi Trò Chơi</h1>
            <div class="mt-4 md:mt-0 flex items-center space-x-4">
                <button id="logout-btn" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold hover:bg-red-100 transition-all flex items-center space-x-2 border border-red-100">
                    <span>🚪</span>
                    <span class="text-sm">Đăng xuất</span>
                </button>
                <button id="sync-btn" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-100 transition-all flex items-center space-x-2 border border-blue-100">
                    <span>🔄</span>
                    <span class="text-sm">Đồng bộ mẫu</span>
                </button>
                <div class="bg-white px-6 py-3 rounded-xl shadow-sm border border-gray-100">
                    <span class="text-gray-500 text-sm uppercase font-bold tracking-wider">Tổng số câu hỏi</span>
                    <div class="text-3xl font-bold text-primary-green" id="total-questions">0</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Form Section -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 sticky top-32">
                    <h2 class="text-2xl font-bold mb-6" id="form-title">Tạo câu hỏi mới</h2>
                    <form id="question-form" class="space-y-4">
                        <input type="hidden" id="edit-index" value="-1">
                        
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">URL hình ảnh</label>
                            <input type="url" id="img-url" required placeholder="https://example.com/image.jpg" class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Tiêu đề hình ảnh</label>
                            <input type="text" id="img-title" required placeholder="Ví dụ: Chai nhựa trôi nổi" class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Nội dung câu hỏi</label>
                            <textarea id="question-text" required rows="3" placeholder="Nhập câu hỏi tại đây..." class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all"></textarea>
                        </div>

                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Đáp án A</label>
                                <input type="text" id="opt-0" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Đáp án B</label>
                                <input type="text" id="opt-1" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Đáp án C</label>
                                <input type="text" id="opt-2" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">Đáp án D</label>
                                <input type="text" id="opt-3" required class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Đáp án đúng</label>
                            <select id="correct-opt" class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all">
                                <option value="0">Đáp án A</option>
                                <option value="1">Đáp án B</option>
                                <option value="2">Đáp án C</option>
                                <option value="3">Đáp án D</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Giải thích (Tùy chọn)</label>
                            <textarea id="explanation-text" rows="2" placeholder="Giải thích tại sao đáp án này đúng..." class="w-full p-3 rounded-lg border border-gray-200 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all"></textarea>
                        </div>

                        <div class="pt-4 space-y-3">
                            <button type="submit" id="submit-btn" class="w-full bg-primary-green hover:bg-green-600 text-white py-4 rounded-xl font-bold transition-all shadow-lg">
                                Tạo câu hỏi
                            </button>
                            <button type="button" id="cancel-btn" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-700 py-4 rounded-xl font-bold transition-all">
                                Hủy chỉnh sửa
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="lg:col-span-2">
                <div class="space-y-6" id="questions-list">
                    <!-- JS will populate this -->
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 z-[100]">
        <div class="bg-gray-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center space-x-3">
            <span id="toast-icon">✅</span>
            <span id="toast-msg">Thành công!</span>
        </div>
    </div>

    <script type="module" src="src/admin.ts"></script>
</body>
</html>
